<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>buttons test</title>

    <link rel="stylesheet" href="../src/custom-properties-default.css" type="text/css" media="all">
    <link rel="stylesheet" href="../src/css/reset.css" type="text/css" media="all">
    <link rel="stylesheet" href="../src/css/layout-base.css" type="text/css" media="all">
    <link rel="stylesheet" href="../src/css/container.css" type="text/css" media="all">
  
    <link rel="stylesheet" href="../src/css/buttons/buttons.css" type="text/css" media="all">
    <link rel="stylesheet" href="../src/css/buttons/status-buttons.css" type="text/css" media="all">
    <link rel="stylesheet" href="../src/css/buttons/btn-close.css" type="text/css" media="all">
    

    <style>
      body {padding: 2rem}
      p {
        margin: .5rem 0;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <p><button type="button" class="btn-close" aria-label="Chiudi"></button> btn-close</p>

      <p><button type="button" class="btn btn-primary">btn-primary</button></p>
      <p><button type="button" class="btn btn-primary btn-hollow">btn-primary btn-hollow</button></p>
      <p><button type="button" class="btn btn-secondary">btn-secondary</button></p>
      <p><button type="button" class="btn btn-secondary btn-hollow">btn-secondary btn-hollow</button></p>

      <p><button type="button" class="btn btn-warning">btn-warning</button></p>
      <p><button type="button" class="btn btn-danger">btn-danger</button></p>
      <p><button type="button" class="btn btn-info">btn-info</button></p>
      <p><button type="button" class="btn btn-success">btn-success</button></p>

      <p><button type="button" class="btn btn-hollow btn-warning">btn-warning btn-hollow</button></p>
      <p><button type="button" class="btn btn-hollow btn-danger">btn-danger btn-hollow</button></p>
      <p><button type="button" class="btn btn-hollow btn-info">btn-info btn-hollow</button></p>
      <p><button type="button" class="btn btn-hollow btn-success">btn-success btn-hollow</button></p>
    </div>

  </body>
</html>
